<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ECE Clinic — Consultation Queue & Online Consult</title>
<link rel="icon" href="/logo.png" />
<style>
  :root{
    --sage:#4E6A63;
    --sage-dark:#3C534D;
    --forest:#18251D;
    --orange:#F1B380;
    --orange-deep:#E2945A;
    --peach:#FAE5D4;
    --mist:#E5E9E8;
    --grey-green:#A5B4B0;
    --paper:#F7F8F8;
    --white:#FFFFFF;
    --ok:#4E6A63;
    --warn:#E2945A;
    --busy:#B5524A;
    --radius:14px;
    --shadow:0 1px 2px rgba(24,37,29,.06),0 8px 24px rgba(24,37,29,.06);
    --shadow-lg:0 12px 40px rgba(24,37,29,.14);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--paper);color:var(--forest);-webkit-font-smoothing:antialiased;line-height:1.5}
  h1,h2,h3,.brandfont{font-family:'Sora',var(--font)}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--sage)}
  .hidden{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 70% -10%,#dfe6e4 0,var(--paper) 55%)}
  .login-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow-lg);
    width:min(420px,92vw);padding:38px 34px;border:1px solid var(--mist)}
  .login-card img{height:46px;margin-bottom:24px}
  .login-card h2{font-size:20px;margin-bottom:4px}
  .login-card p.sub{color:var(--sage);font-size:13px;margin-bottom:24px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--sage-dark);margin-bottom:6px;letter-spacing:.02em}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--mist);
    border-radius:10px;background:var(--white);transition:border .15s,box-shadow .15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--sage);
    box-shadow:0 0 0 3px rgba(78,106,99,.13)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;
    border-radius:10px;font-weight:600;font-size:14px;transition:transform .08s,box-shadow .15s,background .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--sage);color:#fff}
  .btn-primary:hover{background:var(--sage-dark)}
  .btn-accent{background:var(--orange);color:var(--forest)}
  .btn-accent:hover{background:var(--orange-deep)}
  .btn-ghost{background:var(--mist);color:var(--forest)}
  .btn-ghost:hover{background:var(--grey-green)}
  .btn-block{width:100%}
  .role-chips{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 18px}
  .role-chip{padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;border:1.5px solid var(--mist);
    color:var(--sage-dark);background:var(--white)}
  .role-chip.active{background:var(--forest);color:#fff;border-color:var(--forest)}
  .login-err{background:#fbe9e7;color:#8c2f29;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:12px}
  .hint{font-size:11.5px;color:var(--grey-green);margin-top:16px;text-align:center;line-height:1.7}

  /* ---------- SHELL ---------- */
  header.topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--mist);display:flex;align-items:center;gap:16px;padding:0 22px;height:62px}
  .topbar img{height:30px}
  .topbar .spacer{flex:1}
  .who{display:flex;align-items:center;gap:10px;font-size:13px}
  .who .avatar{width:34px;height:34px;border-radius:9px;background:var(--forest);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:13px}
  .who .meta b{display:block;font-size:13px}
  .who .meta span{color:var(--sage);font-size:11.5px;text-transform:capitalize}
  .main{max-width:1180px;margin:0 auto;padding:26px 22px 60px}
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .pagehead h1{font-size:23px;letter-spacing:-.01em}
  .pagehead p{color:var(--sage);font-size:13.5px;margin-top:3px}
  .grid{display:grid;gap:18px}
  .card{background:var(--white);border:1px solid var(--mist);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .card h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--orange)}

  /* ---------- STATUS / AUX ---------- */
  .aux-now{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:12px;
    background:linear-gradient(120deg,#eef2f1,#f7f8f8);border:1px solid var(--mist);margin-bottom:16px}
  .aux-now .pulse{width:13px;height:13px;border-radius:50%;position:relative}
  .aux-now .pulse::after{content:'';position:absolute;inset:-5px;border-radius:50%;opacity:.35;animation:pulse 1.8s infinite}
  @keyframes pulse{0%{transform:scale(.7);opacity:.5}100%{transform:scale(1.7);opacity:0}}
  .aux-now b{font-size:16px}
  .aux-now small{color:var(--sage);display:block;font-size:12px}
  .aux-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .aux-btn{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:13px 14px;border-radius:11px;
    border:1.5px solid var(--mist);background:var(--white);text-align:left;transition:all .14s}
  .aux-btn:hover{border-color:var(--grey-green);transform:translateY(-1px)}
  .aux-btn.active{border-width:2px;box-shadow:var(--shadow)}
  .aux-btn .tag{font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
  .aux-btn .tag i{width:9px;height:9px;border-radius:50%}
  .aux-btn .desc{font-size:11px;color:var(--sage)}

  /* status colors */
  .s-available{--c:#4E6A63}.s-notavailable{--c:#A5B4B0}.s-consultation{--c:#E2945A}
  .s-break{--c:#7C9AD1}.s-lunch{--c:#C98BC0}
  .aux-btn.active.s-available{background:#eef3f1}.aux-btn.active.s-notavailable{background:#f0f2f1}
  .aux-btn.active.s-consultation{background:#fdf2e8}.aux-btn.active.s-break{background:#eef3fb}
  .aux-btn.active.s-lunch{background:#f9eef8}

  /* ---------- TABLES / LISTS ---------- */
  .nurse-row,.book-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--mist)}
  .nurse-row:last-child,.book-row:last-child{border-bottom:none}
  .nurse-row .avatar{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:700;
    color:#fff;font-size:13px;background:var(--sage)}
  .nurse-row .info{flex:1}
  .nurse-row .info b{font-size:14px}
  .nurse-row .info span{font-size:12px;color:var(--sage);display:block;margin-top:1px}
  .nurse-row .info .meta-tags{display:flex}
  .nurse-row .info .meta-tags .chip{display:inline-flex;width:auto}
  .badge{padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .badge i{width:7px;height:7px;border-radius:50%}
  .badge.available{background:#e7f0ec;color:#345c50}
  .badge.notavailable{background:#eef0ef;color:#5f6c68}
  .badge.consultation{background:#fcedde;color:#9a5a25}
  .badge.break{background:#e9f0fa;color:#3d5d8c}
  .badge.lunch{background:#f6e9f4;color:#86477e}
  .badge.pending{background:#fcedde;color:#9a5a25}
  .badge.confirmed{background:#e7f0ec;color:#345c50}
  .badge.completed{background:#eef0ef;color:#5f6c68}

  .book-row{flex-wrap:wrap}
  .book-row .b-main{flex:1;min-width:180px}
  .book-row .b-main b{font-size:14px;display:block}
  .book-row .b-main span{font-size:12px;color:var(--sage)}
  .book-row .b-when{font-size:12.5px;text-align:right;min-width:140px}
  .book-row .b-when b{display:block;font-size:13px}
  .meet-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--sage);
    background:#eef3f1;padding:5px 10px;border-radius:8px;text-decoration:none}
  .meet-link:hover{background:var(--mist)}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}
  .stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px}
  .tile{background:var(--white);border:1px solid var(--mist);border-radius:12px;padding:15px 16px}
  .tile .n{font-family:'Sora';font-size:25px;font-weight:700}
  .tile .l{font-size:12px;color:var(--sage);margin-top:2px}
  .tile.accent{background:linear-gradient(135deg,var(--peach),#fff);border-color:var(--orange)}

  /* tabs */
  .tabs{display:flex;gap:4px;background:var(--mist);padding:4px;border-radius:11px;margin-bottom:20px;width:fit-content;flex-wrap:wrap}
  .tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--sage-dark)}
  .tab.active{background:var(--white);color:var(--forest);box-shadow:var(--shadow)}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--grey-green);padding:4px 0}
  .cal-cell{min-height:74px;border:1px solid var(--mist);border-radius:9px;padding:6px;font-size:11px;position:relative;background:#fff}
  .cal-cell.other{background:var(--paper);color:var(--grey-green)}
  .cal-cell.today{border-color:var(--sage);border-width:2px}
  .cal-cell .d{font-weight:700;font-size:12px}
  .cal-ev{background:var(--peach);color:#9a5a25;border-radius:5px;padding:2px 5px;margin-top:3px;font-size:10px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .cal-ev.online{background:#e7f0ec;color:#345c50}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(24,37,29,.45);z-index:90;display:grid;place-items:center;padding:20px}
  .modal{background:#fff;border-radius:18px;width:min(540px,96vw);max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
  .modal-h h3{font-size:16px}
  .modal-b{padding:20px 22px}
  .modal-f{padding:14px 22px;border-top:1px solid var(--mist);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
  .x{font-size:22px;color:var(--grey-green);line-height:1}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;
    padding:13px 20px;border-radius:11px;font-size:13.5px;z-index:120;box-shadow:var(--shadow-lg);
    display:flex;align-items:center;gap:9px;animation:rise .3s}
  @keyframes rise{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

  .empty{text-align:center;padding:34px 10px;color:var(--grey-green);font-size:13px}
  .empty .ic{font-size:30px;margin-bottom:8px;opacity:.5}

  /* Zoho embed */
  .zoho-wrap{border:1px solid var(--mist);border-radius:12px;overflow:hidden;background:var(--paper)}
  .zoho-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;
    background:#eef3f1;border-bottom:1px solid var(--mist);flex-wrap:wrap}
  .zoho-tag{font-size:12px;font-weight:700;color:var(--sage-dark)}
  .zoho-frame-box{position:relative;min-height:560px}
  .zoho-frame{width:100%;height:560px;border:none;display:block;background:#fff}
  .zoho-fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:8px;padding:30px;background:#fff}
  .zoho-fallback.show{display:flex}
  .zoho-fallback .ic{font-size:34px;opacity:.6}
  .zoho-fallback b{font-size:15px}
  .zoho-fallback p{font-size:12.5px;color:var(--sage);max-width:340px;line-height:1.6;margin-bottom:6px}
  .req{color:var(--orange-deep)}
  .pub-banner{background:var(--forest);color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:20px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .pub-banner .t{flex:1}
  .pub-banner h2{font-size:18px;color:#fff}
  .pub-banner p{color:var(--grey-green);font-size:13px;margin-top:3px}
  /* chips / meta tags */
  .meta-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;
    background:var(--mist);color:var(--sage-dark);padding:3px 8px;border-radius:999px}
  .chip.site{background:#e7f0ec;color:#345c50}
  .wait-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    background:#fcedde;color:#9a5a25;padding:3px 9px;border-radius:999px}
  .wait-pill.done{background:#eef0ef;color:#5f6c68}

  /* report table */
  .table-wrap{overflow-x:auto}
  table.rpt{width:100%;border-collapse:collapse;font-size:12.5px}
  table.rpt th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--grey-green);
    padding:8px 10px;border-bottom:2px solid var(--mist);white-space:nowrap}
  table.rpt td{padding:10px;border-bottom:1px solid var(--mist);vertical-align:top}
  table.rpt td .sub{font-size:11px;color:var(--grey-green);margin-top:2px}
  table.rpt tr:hover td{background:var(--paper)}

  /* settings radio options */
  .opt{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border:1.5px solid var(--mist);
    border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .14s}
  .opt:hover{border-color:var(--grey-green)}
  .opt.sel{border-color:var(--sage);border-width:2px;background:#eef3f1}
  .opt b{display:block;font-size:14px;margin-bottom:2px}
  .opt span{font-size:12px;color:var(--sage)}
  .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--grey-green);display:block;margin-top:2px;position:relative}
  .radio.on{border-color:var(--sage)}
  .radio.on::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--sage)}

  /* tracking id box */
  .trk-box{font-family:'Sora';font-size:26px;font-weight:800;letter-spacing:.04em;color:var(--forest);
    background:linear-gradient(135deg,var(--peach),#fff);border:2px dashed var(--orange);
    border-radius:12px;padding:16px;display:inline-block;min-width:200px}

  /* in-app booking alert */
  #alertRoot{position:fixed;top:74px;right:18px;z-index:110;display:flex;flex-direction:column;gap:10px;max-width:340px}
  .alert-card{background:var(--white);border:1px solid var(--mist);border-left:4px solid var(--orange);
    border-radius:12px;box-shadow:var(--shadow-lg);padding:13px 14px;display:flex;gap:11px;align-items:flex-start;
    animation:slideIn .35s cubic-bezier(.2,.8,.2,1)}
  .alert-card.leaving{animation:slideOut .4s forwards}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideOut{to{opacity:0;transform:translateX(30px)}}
  .alert-ic{font-size:20px;line-height:1.2}
  .alert-body{flex:1;min-width:0}
  .alert-body b{font-size:13.5px;display:block}
  .alert-tags{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0}
  .alert-sub{font-size:11.5px;color:var(--sage)}
  .alert-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .alert-x{font-size:18px;color:var(--grey-green);line-height:1}
  @media(max-width:560px){#alertRoot{left:12px;right:12px;max-width:none}}

  @media(max-width:760px){.main{padding:18px 14px 50px}.cal-cell{min-height:54px}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <img id="loginLogo" alt="ECE Contact Centers" />
    <h2>Clinic Portal</h2>
    <p class="sub">Consultation queue &amp; online consultation</p>
    <div id="loginErr" class="login-err hidden"></div>
    <div class="field">
      <label>Sign in as</label>
      <div class="role-chips" id="roleChips">
        <button class="role-chip active" data-role="nurse">Nurse</button>
        <button class="role-chip" data-role="doctor">Doctor</button>
        <button class="role-chip" data-role="admin">Admin</button>
        <button class="role-chip" data-role="employee">Employee</button>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="you@ece.com" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Sign in</button>
    <button class="btn btn-ghost btn-block" style="margin-top:9px" onclick="openPublic()">Open public booking page →</button>
    <div class="hint">
      Demo accounts (password: <b>demo</b>)<br/>
      nurse@ece.com · doctor@ece.com · admin@ece.com · employee@ece.com
    </div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="hidden">
  <header class="topbar">
    <img id="topLogo" alt="ECE" />
    <div class="spacer"></div>
    <div class="who">
      <div class="meta" style="text-align:right">
        <b id="whoName">—</b>
        <span id="whoRole">—</span>
      </div>
      <div class="avatar" id="whoAvatar">?</div>
      <button class="btn btn-ghost" style="padding:8px 12px" onclick="logout()">Sign out</button>
    </div>
  </header>
  <div class="main" id="view"></div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  err.classList.add('hidden');
  if(API_BASE){
    try{
      const u=await api('/login',{method:'POST',body:JSON.stringify({email,password:pass,role:selectedRole})});
      SESSION={...u,email};
    }catch(e){err.textContent="Invalid credentials or wrong role for this account.";err.classList.remove('hidden');return;}
  }else{
    const u=DEMO[email];
    if(!u||pass!=="demo"){err.textContent="Invalid credentials. Use a demo account with password: demo";err.classList.remove('hidden');return;}
    if(u.role!==selectedRole){err.textContent=`That account is a ${u.role}. Switch the role selector to ${u.role}.`;err.classList.remove('hidden');return;}
    SESSION={...u,email};
  }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  paintShell();startQueueWatch();render();
}
function logout(){SESSION=null;stopQueueWatch();document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('loginPass').value="";}

/* ---------- toast & modal ---------- */
function toast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML='✓ '+msg;
  document.getElementById('toastRoot').appendChild(t);setTimeout(()=>t.remove(),2800);}
function modal(html){document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML="";}

/* ---------- data access (mock or live) ---------- */
async function api(path,opts){
  if(!API_BASE){ return mockApi(path,opts); }
  const res=await fetch(API_BASE+path,{headers:{'Content-Type':'application/json'},...opts});
  if(!res.ok)throw new Error('API '+res.status);
  return res.json();
}
function mockApi(path,opts){
  const body=opts&&opts.body?JSON.parse(opts.body):{};
  return new Promise(r=>setTimeout(()=>{
    if(path==='/staff')return r(MOCK.staff);
    if(path==='/bookings')return r(MOCK.bookings);
    if(path==='/settings'){
      if(opts&&opts.method==='POST'){Object.assign(MOCK.settings,body);return r(MOCK.settings);}
      return r(MOCK.settings);
    }
    if(path==='/status'){const u=MOCK.staff.find(s=>s.id===body.userId);if(u){u.status=body.status;if(body.status==='available')u.lastIdleAt=new Date().toISOString();}return r({ok:true});}
    if(path==='/book'){const b={id:'b'+Date.now(),trackingId:'TRK-'+Math.floor(1000+Math.random()*9000),...body,status:'pending',assignedTo:'',
      meet:body.mode==='online'?'https://meet.google.com/new-mock-link':'',createdAt:new Date().toISOString(),acceptedAt:'',consultEndAt:''};
      MOCK.bookings.unshift(b);return r(b);}
    if(path==='/booking-update'){const b=MOCK.bookings.find(x=>x.id===body.id);Object.assign(b,body);return r(b);}
    r({ok:true});
  },150));
}

/* ---------- waiting / handling time helpers ---------- */
function fmtDur(ms){
  if(ms==null||isNaN(ms)||ms<0)return '—';
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0)return `${h}h ${m%60}m`;
  if(m>0)return `${m}m ${s%60}s`;
  return `${s}s`;
}
function waitingMs(b){ // from created until accepted (or now if still pending)
  const start=b.createdAt?new Date(b.createdAt).getTime():null;
  if(!start)return null;
  const end=b.acceptedAt?new Date(b.acceptedAt).getTime():Date.now();
  return end-start;
}
function handlingMs(b){ // accepted until consult end
  if(!b.acceptedAt||!b.consultEndAt)return null;
  return new Date(b.consultEndAt).getTime()-new Date(b.acceptedAt).getTime();
}

let liveTimer=null;
async function renderQueue(el){
  const bookings=await api('/bookings');
  const pending=bookings.filter(b=>b.status==='pending');
  const confirmed=bookings.filter(b=>b.status==='confirmed');
  el.innerHTML=`
    <div class="stat-tiles">
      <div class="tile accent"><div class="n">${pending.length}</div><div class="l">Pending requests</div></div>
      <div class="tile"><div class="n">${confirmed.length}</div><div class="l">Confirmed</div></div>
      <div class="tile"><div class="n">${bookings.filter(b=>b.mode==='online').length}</div><div class="l">Online consults</div></div>
    </div>
    <div class="card"><h3><span class="dot"></span>Pending — needs action</h3>
      ${pending.length?pending.map(b=>bookingRowHTML(b,true)).join(''):emptyState('No pending requests','📭')}</div>
    <div class="card" style="margin-top:18px"><h3><span class="dot"></span>Confirmed bookings</h3>
      ${confirmed.length?confirmed.map(b=>bookingRowHTML(b,true)).join(''):emptyState('Nothing confirmed yet')}</div>`;
  // live-update the waiting timers every second
  if(liveTimer)clearInterval(liveTimer);
  liveTimer=setInterval(()=>{
    document.querySelectorAll('[data-wait]').forEach(elx=>{
      const created=elx.getAttribute('data-wait');
      elx.textContent=fmtDur(Date.now()-new Date(created).getTime());
    });
  },1000);
}
function bookingRowHTML(b,actions){
  const dt=new Date(b.date);
  const waitLabel = b.status==='pending'
    ? `<span class="wait-pill">⏱ waiting <b data-wait="${b.createdAt}">${fmtDur(waitingMs(b))}</b></span>`
    : (b.acceptedAt?`<span class="wait-pill done">waited ${fmtDur(waitingMs(b))}</span>`:'');
  return `<div class="book-row">
    <div class="b-main">
      <b>${b.employee} &nbsp;<span class="badge ${b.status}">${b.status}</span></b>
      <span>${b.trackingId?`<b>${b.trackingId}</b> · `:''}${b.zohoEmail||''} · ${b.reason}</span>
      <span class="meta-tags">${siteTag(b.site)} ${b.building?`<span class="chip">🏢 ${b.building}</span>`:''} <span class="chip">${b.mode==='online'?'🖥 Online':'🏥 Onsite'}</span> ${b.assignedTo?`<span class="chip">👤 ${b.assignedTo}</span>`:''}</span>
    </div>
    <div class="b-when">
      <b>${dt.toLocaleDateString([], {month:'short',day:'numeric'})}</b>${dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
      <div style="margin-top:5px">${waitLabel}</div>
    </div>

      ${b.meet?`<a class="meet-link" href="${b.meet}" target="_blank">🎥 Join Meet</a>`:''}
      ${actions&&b.status==='pending'?`<button class="btn btn-primary" style="padding:7px 13px" onclick="confirmBooking('${b.id}')">Accept &amp; assign me</button>`:''}

/* ---------- NEW-BOOKING ALERT (in-app banner + sound) ---------- */
let queueWatch=null, lastSeenIds=null;
function startQueueWatch(){
  if(!SESSION||SESSION.role==='employee'||SESSION.role==='public')return;
  stopQueueWatch();
  queueWatch=setInterval(checkNewBookings,8000);
  checkNewBookings(true);
}
function stopQueueWatch(){ if(queueWatch){clearInterval(queueWatch);queueWatch=null;} lastSeenIds=null; }
async function checkNewBookings(silent){
  try{
    const staff=await api('/staff');
    const me=staff.find(s=>s.id===SESSION.id);
    // only alert staff who are Available
    const amAvailable = me ? me.status==='available' : (SESSION.role==='admin');
    const bookings=await api('/bookings');
    const pendingIds=bookings.filter(b=>b.status==='pending').map(b=>b.id);
    if(lastSeenIds===null){ lastSeenIds=new Set(pendingIds); return; }
    const fresh=pendingIds.filter(id=>!lastSeenIds.has(id));
    lastSeenIds=new Set(pendingIds);
    if(silent||!amAvailable)return;
    fresh.forEach(id=>{
      const b=bookings.find(x=>x.id===id);
      if(b)showBookingAlert(b);
    });
  }catch(e){/* ignore poll errors */}
}
function showBookingAlert(b){
  beep();
  const div=document.createElement('div');
  div.className='alert-card';
  div.innerHTML=`
    <div class="alert-ic">🔔</div>
    <div class="alert-body">
      <b>New booking request</b>
      <div class="alert-tags">${siteTag(b.site)} <span class="chip">${b.mode==='online'?'🖥 Online':'🏥 Onsite'}</span> ${b.building?`<span class="chip">🏢 ${b.building}</span>`:''}</div>
      <span class="alert-sub">${b.employee} · ${b.reason}${b.trackingId?` · ${b.trackingId}`:''}</span>
    </div>
    <div class="alert-actions">
      <button class="btn btn-primary" style="padding:6px 12px" onclick="gotoQueueFromAlert(this)">View queue</button>
      <button class="alert-x" onclick="this.closest('.alert-card').remove()">×</button>
    </div>`;
  document.getElementById('alertRoot').appendChild(div);
  setTimeout(()=>{div.classList.add('leaving');setTimeout(()=>div.remove(),400);},12000);
}
function gotoQueueFromAlert(btn){
  btn.closest('.alert-card').remove();
  if(SESSION&&SESSION.role!=='employee'){TAB='queue';render();}
}
// tiny WebAudio beep so we don't need an audio file
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=880;g.gain.value=0.07;
    o.start();o.frequency.setValueAtTime(660,ctx.currentTime+0.12);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.35);
    o.stop(ctx.currentTime+0.36);
  }catch(e){}
}

/* ---------- EMPLOYEE VIEW ---------- */
async function renderEmployee(v){
  const staff=await api('/staff');
  const available=staff.filter(s=>(s.role==='nurse'||s.role==='doctor')&&s.status==='available');
  const onsitePresent=available.length>0;
  v.innerHTML=`
    <div class="pagehead"><div><h1>Book a Consultation</h1>
      <p>See who's available now and request a consultation.</p></div></div>
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card"><h3><span class="dot"></span>Available now</h3>
        ${available.length?available.map(s=>`<div class="nurse-row">
          <div class="avatar">${(s.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div class="info"><b>${s.name}</b><span style="text-transform:capitalize">${s.role}</span>
            <span class="meta-tags">${siteTag(s.site)} ${s.building?`<span class="chip">🏢 ${s.building}</span>`:''}</span></div>
          ${statusBadge(s.status)}</div>`).join('')
          :`<div class="empty"><div class="ic">🌙</div>No onsite staff available right now.<br/>You can still request an <b>online consultation</b> via Google Meet.</div>`}
      </div>
      <div class="card"><h3><span class="dot"></span>Request a consultation</h3>
        ${bookFormHTML(onsitePresent)}</div>
    </div>`;
}
function bookFormHTML(onsitePresent){
  return `<div id="bookForm">
    <div class="field"><label>Your name <span class="req">*</span></label><input id="bk_name" value="${SESSION&&SESSION.role==='employee'?SESSION.name:''}"/></div>
    <div class="field"><label>ECE Zoho email <span class="req">*</span></label><input id="bk_email" type="email" placeholder="you@ececontactcenters.com"/></div>
    <div class="field"><label>Reason for consultation <span class="req">*</span></label><input id="bk_reason" placeholder="e.g. fever, checkup"/></div>
    <div class="row2">
      <div class="field"><label>Site <span class="req">*</span></label>
        <select id="bk_site">${SITES.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>
      <div class="field"><label>Building <span class="req">*</span></label>
        <select id="bk_building">${BUILDINGS.map(b=>`<option value="${b}">${b}</option>`).join('')}</select></div>
    </div>
    <div class="row2">
      <div class="field"><label>Preferred date <span class="req">*</span></label><input id="bk_date" type="date"/></div>
      <div class="field"><label>Time <span class="req">*</span></label><input id="bk_time" type="time"/></div>
    </div>
    <div class="field"><label>Consultation type</label>
      <select id="bk_mode">
        <option value="onsite" ${!onsitePresent?'disabled':''}>Onsite ${!onsitePresent?'(no staff available)':''}</option>
        <option value="online" ${!onsitePresent?'selected':''}>Online (Google Meet)</option>
      </select></div>
    <button class="btn btn-accent btn-block" onclick="submitBooking()">Request consultation</button>
    <p style="font-size:11.5px;color:var(--grey-green);margin-top:10px">Online consultations generate a Google Meet link automatically once a nurse or doctor confirms.</p>
  </div>`;
}
async function submitBooking(){
  const p=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  if(!p('bk_name')||!p('bk_email')||!p('bk_reason')||!p('bk_site')||!p('bk_building')||!p('bk_date')||!p('bk_time')){toast('Please complete all required fields');return;}
  const date=new Date(p('bk_date')+'T'+p('bk_time')).toISOString();
  const res=await api('/book',{method:'POST',body:JSON.stringify({
    employee:p('bk_name'),zohoEmail:p('bk_email'),reason:p('bk_reason'),
    site:p('bk_site'),building:p('bk_building'),date,mode:p('bk_mode')})});
  const trk=res&&res.trackingId?res.trackingId:'(pending)';
  modal(`<div class="modal" style="width:min(440px,94vw)"><div class="modal-h"><h3>Request received</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-b" style="text-align:center">
      <div style="font-size:40px;margin-bottom:6px">✅</div>
      <p style="font-size:13.5px;color:var(--sage);margin-bottom:14px">Your consultation request has been logged. Save your tracking ID:</p>
      <div class="trk-box">${trk}</div>
      <p style="font-size:11.5px;color:var(--grey-green);margin-top:14px">An available nurse or doctor will be alerted. For online consultations, a Google Meet link is created once confirmed.</p>
    </div>
    <div class="modal-f"><button class="btn btn-primary" onclick="closeModal()">Done</button></div></div>`);
  if(SESSION&&SESSION.role==='employee')renderEmployee(document.getElementById('view'));
  else if(SESSION&&SESSION.role==='public')renderPublic();
}

/* ---------- PUBLIC BOOKING (no login) ---------- */
function openPublic(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  SESSION={name:'',role:'public',email:''};
  paintShellPublic();renderPublic();
}
function paintShellPublic(){
  document.getElementById('whoName').textContent='Public booking';
  document.getElementById('whoRole').textContent='No sign-in needed';
  document.getElementById('whoAvatar').textContent='+';
}
async function renderPublic(){
  const v=document.getElementById('view');
  const staff=await api('/staff');
  const available=staff.filter(s=>(s.role==='nurse'||s.role==='doctor')&&s.status==='available');
  const onsitePresent=available.length>0;
  v.innerHTML=`
    <div class="pub-banner">
      <div class="t"><h2>Request a clinic consultation</h2>
      <p>Provide your ECE Zoho email to book. Online consultations are hosted on Google Meet.</p></div>
      <button class="btn btn-accent" onclick="logout()">Staff sign in</button>
    </div>
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card"><h3><span class="dot"></span>Available now</h3>
        ${available.length?available.map(s=>`<div class="nurse-row">
          <div class="avatar">${(s.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div class="info"><b>${s.name}</b><span style="text-transform:capitalize">${s.role}</span>
            <span class="meta-tags">${siteTag(s.site)} ${s.building?`<span class="chip">🏢 ${s.building}</span>`:''}</span></div>
          ${statusBadge(s.status)}</div>`).join('')
          :`<div class="empty"><div class="ic">🌙</div>No onsite staff right now — book an online consultation.</div>`}
      </div>
      <div class="card"><h3><span class="dot"></span>Booking request</h3>${bookFormHTML(onsitePresent)}</div>
    </div>`;
}

/* ---------- helpers ---------- */
function sameDay(iso,d){const a=new Date(iso);return a.getFullYear()===d.getFullYear()&&a.getMonth()===d.getMonth()&&a.getDate()===d.getDate();}
function emptyState(msg,ic='🗂'){return `<div class="empty"><div class="ic">${ic}</div>${msg}</div>`;}
</script>
